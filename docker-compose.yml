services:
  ollama:
    image: ollama/ollama:latest
    container_name: legal-embedding-server
    restart: unless-stopped
    ports:
      - "11434:11434"  # Ollama API端口
    volumes:
      # 模型持久化存储（关键：避免每次重新下载）
      - ./backend/ollma_models:/root/.ollama
      # 自定义模型文件目录（可选）
      - ./models:/models
      # 启动脚本挂载
      - ./backend/scripts:/scripts
    environment:
      # 环境变量配置
      - OLLAMA_HOST=0.0.0.0  # 允许所有网络接口访问
      - OLLAMA_KEEP_ALIVE=5m  # 模型保持内存时间
      - OLLAMA_NUM_PARALLEL=1  # 并行请求数（根据GPU调整）
      - OLLAMA_MAX_LOADED_MODELS=1  # 最大加载模型数
      - OLLAMA_ORIGINS=*  # 允许跨域访问
      # 网络优化配置
      - OLLAMA_REQUEST_TIMEOUT=600  # 请求超时时间（秒）
      - OLLAMA_LOAD_TIMEOUT=300  # 加载超时时间（秒）
      # 如果需要使用代理，取消下面的注释并配置
      # - HTTP_PROXY=http://your-proxy:port
      # - HTTPS_PROXY=http://your-proxy:port
    # 资源限制（适配2GB GPU的关键配置）
    deploy:
      resources:
        limits:
          memory: 4G  # 内存限制
          cpus: '2'   # CPU核心限制
    # 如果使用GPU（可选，但推荐）
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    networks:
      - legal-network
    # 健康检查
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # docker-compose.yml 新增服务
  neo4j:
    image: neo4j:5.15-community
    container_name: legal-graph-db
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - ./backend/neo4j/data:/data
      - ./backend/neo4j/logs:/logs
      - ./backend/neo4j/import:/var/lib/neo4j/import
    environment:
      - NEO4J_AUTH=neo4j/legal_password_2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5

  # docker-compose.yml 新增服务
  chroma:
    image: chromadb/chroma:latest
    container_name: legal-vector-db
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./backend/chroma_data:/data
    networks:
      - legal-network
  # 可选的API网关或监控服务（根据需求添加）
  # app:
  #   build: .
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - ollama
  #   networks:
  #     - legal-network

networks:
  legal-network:
    driver: bridge