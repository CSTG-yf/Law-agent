
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" fill="none" viewBox="0 0 1024 1024">
  <g transform="translate(-120,-260) scale(27)">
    <!-- 放大后的提示词对话气泡，占满原来的外框区域 -->
    <rect
      x="6"
      y="12"
      width="32"
      height="28"
      rx="6"
      stroke="#4f86ff"
      stroke-width="3"
      stroke-linecap="round"
    />

    <!-- 气泡尾巴，连接在底部边缘 -->
    <path
      d="M16 40 L10 46 L22 40"
      stroke="#4f86ff"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- 气泡内 4 条文字线条（加长且均匀分布） -->
    <line x1="10" y1="20" x2="34" y2="20" stroke="#4f86ff" stroke-width="2" stroke-linecap="round" />
    <line x1="10" y1="24" x2="30" y2="24" stroke="#4f86ff" stroke-width="2" stroke-linecap="round" />
    <line x1="10" y1="28" x2="32" y2="28" stroke="#4f86ff" stroke-width="2" stroke-linecap="round" />
    <line x1="10" y1="32" x2="28" y2="32" stroke="#4f86ff" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
